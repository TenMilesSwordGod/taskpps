name: Test

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "u/**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" repo
          cd repo
          git checkout "${{ github.ref_name }}"

      - name: Setup Python
        working-directory: repo/server
        run: |
          apt-get update && apt-get install -y python3 python3-pip python3-venv
          python3 --version

      - name: Setup uv
        working-directory: repo/server
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          uv --version

      - name: Install dependencies
        working-directory: repo/server
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen

      - name: Ruff check
        working-directory: repo/server
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run --frozen ruff check --output-format=github

      - name: Ruff format
        working-directory: repo/server
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run --frozen ruff format --check --diff

  test-python:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" repo
          cd repo
          git checkout "${{ github.ref_name }}"

      - name: Setup Python
        working-directory: repo/server
        run: |
          apt-get update && apt-get install -y python3 python3-pip python3-venv
          python3 --version

      - name: Setup uv
        working-directory: repo/server
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          uv --version

      - name: Install dependencies
        working-directory: repo/server
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --frozen

      - name: Run tests
        working-directory: repo/server
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run --frozen pytest tests/ \
            -v \
            --tb=short \
            -m "not slow" \
            --ignore=tests/test_api.py \
            --ignore=tests/test_runner_steps.py \
            --junitxml=junit.xml \
            --cov=taskpps \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        if: always()
        working-directory: repo/server
        run: |
          echo "Test results uploaded (artifact upload not available without actions/upload-artifact)"
          cat junit.xml || true

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" repo
          cd repo
          git checkout "${{ github.ref_name }}"

      - name: Setup Go
        run: |
          apt-get update && apt-get install -y golang-go
          go version

      - name: Unit test with coverage
        working-directory: repo/cli
        run: |
          go test ./tui ./tui/components -v -count=1 -coverprofile=coverage.out -timeout 120s
          go tool cover -func=coverage.out | tail -1

      - name: Build
        working-directory: repo/cli
        run: go build -o taskpps-cli .

      - name: Upload Go build artifact
        if: always()
        working-directory: repo/cli
        run: |
          echo "Build artifact available at cli/taskpps-cli"

  fuzz-go:
    name: Go Fuzz Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" repo
          cd repo
          git checkout "${{ github.ref_name }}"

      - name: Setup Go
        run: |
          apt-get update && apt-get install -y golang-go
          go version

      - name: Fuzz test - model & update
        working-directory: repo/cli
        run: |
          go test ./tui -fuzz='^FuzzModelUpdate$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzModelUpdateWithLongData$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzModelUpdateWithRuns$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzModelUpdateWithSmallWindow$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzModelViewWithResize$' -fuzztime=180s -timeout=200s

      - name: Fuzz test - components
        working-directory: repo/cli
        run: |
          go test ./tui -fuzz='^FuzzRunListUpdate$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzRunDetailUpdate$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzLogViewerContent$' -fuzztime=180s -timeout=200s

      - name: Fuzz test - helpers
        working-directory: repo/cli
        run: |
          go test ./tui -fuzz='^FuzzTruncateLine$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzTruncateStr$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzPadRightVisual$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzMakeProgressBar$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzStatusIcon$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzFormatTime$' -fuzztime=180s -timeout=200s
          go test ./tui -fuzz='^FuzzFormatTimeNil$' -fuzztime=180s -timeout=200s

      - name: Fuzz test - merge & data
        working-directory: repo/cli
        run: |
          go test ./tui -fuzz='^FuzzMergeRuns$' -fuzztime=180s -timeout=200s
