name: Test

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: lint

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run --frozen ruff check --output-format=github

      - name: Ruff format
        run: uv run --frozen ruff format --check --diff

  test-python:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: py${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: |
          uv run --frozen pytest tests/ \
            -v \
            --tb=short \
            -m "not slow" \
            --ignore=tests/test_api.py \
            --ignore=tests/test_runner_steps.py \
            --junitxml=junit.xml \
            --cov=taskpps \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-py${{ matrix.python-version }}
          path: |
            server/junit.xml
            server/coverage.xml

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache: true

      - name: Test
        run: go test ./... -v -coverprofile=coverage.out

      - name: Build
        run: go build -o taskpps-cli .

      - name: Upload Go build artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskpps-cli-linux
          path: cli/taskpps-cli
