name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-server:
    name: Build Python Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-suffix: release

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests before build
        run: |
          uv run --frozen pytest tests/ \
            -v \
            --tb=short \
            --cov=taskpps \
            --cov-report=term-missing

      - name: Build wheel
        run: uv build

      - name: Upload server package
        uses: actions/upload-artifact@v4
        with:
          name: taskpps-server-pkg
          path: server/dist/

  build-cli:
    name: Build Go CLI (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache: true

      - name: Run Go tests
        run: |
          go test ./tui -v -count=1 -run TestGolden -update -timeout 60s
          go test ./tui ./tui/components -v -count=1 -timeout 120s

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="taskpps-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w" -o "$BINARY_NAME" .
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: taskpps-cli-${{ matrix.os }}-${{ matrix.arch }}
          path: cli/${{ env.BINARY_NAME }}

  build-agent:
    name: Build Agent Executor (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        # Issue #69: 增加 arm (armv7l) 架构支持，GOARM 默认为 7
        arch: [amd64, arm64, arm]
    defaults:
      run:
        working-directory: execution_agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: execution_agent/go.mod
          cache: true

      - name: Run tests
        run: go test ./... -v -count=1 -timeout 120s

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          BINARY_NAME="taskpps-agent-linux-${GOARCH}"
          go build -ldflags="-s -w" -o "$BINARY_NAME" .
          echo "BINARY_NAME=$BINARY_NAME" >> $GITHUB_ENV

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: taskpps-agent-linux-${{ matrix.arch }}
          path: execution_agent/${{ env.BINARY_NAME }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-server
      - build-cli
      - build-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download server package
        uses: actions/download-artifact@v4
        with:
          name: taskpps-server-pkg
          path: dist/

      - name: Download CLI binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/cli/

      - name: Download agent binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/agent/

      - name: List artifacts
        run: find dist/ -type f

      - name: Create Release
        uses: actions/gitea/release-action@v1
        with:
          files: |
            dist/**/*.whl
            dist/**/*.tar.gz
            dist/cli/**/taskpps-*
            dist/agent/**/taskpps-agent-*
          tag: ${{ github.ref_name }}
          title: Release ${{ github.ref_name }}
          body: |
            ## Changes

            See [CHANGELOG] for details.

            ## Assets

            - `taskpps-server-*.whl` — Python server wheel
            - `taskpps-{os}-{arch}` — CLI binaries for each platform
            - `taskpps-agent-linux-{arch}` — Agent executor binaries for Linux
