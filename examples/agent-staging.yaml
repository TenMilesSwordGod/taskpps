# Agent 文件 — SSH 类型 Agent
# 每个 YAML 文件管理一类 Agent, 通过 id 字段引用
# 引用语法: ${agent:<id>.<field>}
# 流水线中通过 host: <agent-id> 指定目标主机

agents:
  - id: staging-server
    name: "预发环境服务器"
    description: "预发环境测试服务器"
    type: ssh-username-password
    host: 192.168.1.100
    port: 22
    username: deploy
    credential_id: staging-cred
    max_parallel: 3

  - id: dev-server
    name: "开发环境服务器"
    description: "开发测试用本地机器"
    type: ssh-username-password
    host: 127.0.0.1
    port: 22
    username: admin
    credential_id: default-cred