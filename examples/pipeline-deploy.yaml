# 部署流水线示例 — 新格式(subpipelines + config)
# 旧格式(options + tasks)仍然兼容, 会自动包装为单子流水线

name: deploy

config:
  host: staging-server          # Agent ID(非文件名)
  credential: default-cred      # Credential ID(非文件名)
  env:
    APP_ENV: staging
    TAG: latest
    API_SECRET: ${credential:default-cred.password}
  timeout: 600
  retry: 1                      # 失败重试 1 次(等待 5 秒)
  on_failure: fail
  execution_strategy: sequential

pipelines:
  - name: build-and-deploy      # 子流水线 1
    tasks:
      - name: pull-images
        command: docker pull myapp:${TAG}

      - name: migrate
        invoke:
          task: deploy_tasks.migrate_db
          kwargs:
            target_version: ${MIGRATE_VERSION}
        timeout: 300
        depends_on: [pull-images]

      - name: restart
        commands:                # 多命令数组
          - supervisorctl stop all
          - sleep 5
          - supervisorctl start all
        depends_on: [migrate]

  - name: verify                 # 子流水线 2 — 依赖子流水线 1
    depends_on: [build-and-deploy]
    config:
      execution_strategy: parallel
    tasks:
      - name: health-check
        command: curl -sf http://localhost:8000/health

      - name: smoke-test
        command: curl -sf http://localhost:8000/api/v1/status
        when: ${env.APP_ENV} == "staging"