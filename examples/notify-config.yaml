# Webhook 通知系统配置示例
#
# 将此内容合并到你的 taskpps.yaml 中
# 配置后，taskpps 会在对应事件发生时向指定 URL 发送 POST 请求

server:
  host: 127.0.0.1
  port: 26521

# ── 通知器配置 ──────────────────────────────────────────
# 每个 notifier 会监听指定事件并推送到外部 URL
notifiers:
  # 示例 1：Slack Webhook
  - name: slack-deploy-alerts
    type: webhook
    config:
      url: https://hooks.slack.com/services/PLACEHOLDER
      events:
        - run_completed
        - run_cancelled
      headers:
        X-Slack-Source: taskpps
      timeout: 5
      retry: 2

  # 示例 2：飞书机器人
  - name: feishu-notify
    type: webhook
    config:
      url: https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
      events:
        - pipeline_started
        - task_finished
        - run_completed
        - run_cancelled
      timeout: 10
      retry: 3

  # 示例 3：钉钉机器人
  - name: dingtalk-bot
    type: webhook
    config:
      url: https://oapi.dingtalk.com/robot/send?access_token=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      events:
        - run_completed
      headers:
        Content-Type: application/json
      timeout: 10
      retry: 3

  # 示例 4：自定义内部服务
  - name: internal-monitor
    type: webhook
    config:
      url: http://monitor.internal:8080/api/events
      events:
        - pipeline_started
        - task_started
        - task_finished
        - run_completed
        - run_cancelled
        - retry_started
        - retry_finished
      headers:
        Authorization: Bearer xxxxxxxx
        X-Service-Name: taskpps
      timeout: 15
      retry: 3

# ── 触发器配置 ──────────────────────────────────────────
triggers:
  - type: cron
    schedule: "0 * * * *"
    pipeline: pipeline-steps.yaml
