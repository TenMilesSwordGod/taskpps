# Agent 文件 — 生产环境 Agent

agents:
  - id: prod-server
    name: "生产环境服务器"
    description: "生产环境主服务器"
    type: ssh-key
    host: 10.0.0.50
    port: 22
    username: admin
    credential_id: prod-cred
    max_parallel: 1

  - id: prod-worker-01
    name: "生产 Worker 01"
    description: "生产环境 Worker 节点"
    type: ssh-key
    host: 10.0.0.51
    port: 22
    username: admin
    credential_id: prod-cred