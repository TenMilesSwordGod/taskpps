# 夜间定时任务流水线示例 — 新格式
name: nightly

config:
  host: prod-server              # Agent ID
  credential: prod-cred          # Credential ID
  env:
    APP_ENV: production
  timeout: 1800
  retry: 1
  on_failure: continue
  execution_strategy: parallel

pipelines:
  - name: nightly-tasks
    tasks:
      - name: backup-db
        command: pg_dump -U admin mydb > /backup/db_$(date +%Y%m%d).sql
        timeout: 600

      - name: run-reports
        commands:
          - cd /app
          - python generate_reports.py
          - echo "reports done"
        timeout: 1200

      - name: cleanup-logs
        command: find /var/log/app -name "*.log" -mtime +30 -delete
        depends_on: [backup-db]

      - name: notify
        command: curl -X POST https://hooks.example.com/notify -d 'nightly done'
        depends_on: [run-reports, cleanup-logs]
        retry: 2