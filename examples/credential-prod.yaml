# 凭据文件 — Git / Token 类型凭据

credentials:
  - id: prod-cred
    name: "生产环境SSH凭据"
    description: "生产服务器 SSH 密钥认证"
    type: ssh-key
    username: deploy
    key_path: ~/.ssh/prod_deploy_key

  - id: github-token
    name: "GitHub Token"
    description: "GitHub 个人访问令牌"
    type: token
    token: ghp_xxxxxxxxxxxx