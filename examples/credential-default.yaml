# 凭据文件 — SSH 类型凭据
# 每个 YAML 文件管理一类凭据, 通过 id 字段引用
# 引用语法: ${credential:<id>.<field>}

credentials:
  - id: default-cred
    name: "默认SSH凭据(密码认证)"
    description: "测试/开发环境 SSH 凭据"
    type: ssh-username-password
    username: admin
    password: changeme

  - id: staging-cred
    name: "预发环境SSH凭据"
    description: "预发环境 SSH 密钥认证"
    type: ssh-key
    username: deploy
    key_path: ~/.ssh/staging_deploy_key