# CI Build & Publish — Git + Nexus 联动流水线示例
# 使用 git: 声明式克隆代码, nexus: 声明式上传制品

name: CI Build & Publish

config:
  timeout: 1800
  execution_strategy: sequential
  env:
    GIT_TOKEN: ${credential:github-token.token}
    NEXUS_URL: ${credential:nexus-admin.nexus_url}
    NEXUS_USER: ${credential:nexus-admin.username}
    NEXUS_PASS: ${credential:nexus-admin.password}

pipelines:
  - name: checkout
    tasks:
      - name: clone-repo
        git:
          repo: "https://github.com/org/myapp.git"
          ref: "main"
          credential: "github-token"
          dest: "/workspace/myapp"

  - name: build-and-test
    depends_on: [checkout]
    tasks:
      - name: compile
        command: cd /workspace/myapp && mvn clean compile

      - name: unit-test
        command: cd /workspace/myapp && mvn test
        depends_on: [compile]

      - name: package
        command: cd /workspace/myapp && mvn package -DskipTests
        depends_on: [unit-test]

  - name: publish-artifacts
    depends_on: [build-and-test]
    tasks:
      - name: upload-jar
        nexus:
          action: upload
          url: "${env.NEXUS_URL}"
          repository: "maven-releases"
          credential: "nexus-admin"
          group_id: "com.example"
          artifact_id: "myapp"
          version: "${env.BUILD_VERSION}"
          files:
            - "/workspace/myapp/target/myapp.jar"
            - "/workspace/myapp/target/myapp-sources.jar"
            - "/workspace/myapp/pom.xml"