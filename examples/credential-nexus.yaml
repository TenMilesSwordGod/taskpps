# Nexus Repository 凭据文件
# 引用语法: ${credential:<id>.<field>}

credentials:
  - id: nexus-admin
    name: "Nexus 管理员凭据"
    description: "Nexus Repository Manager 管理员账号"
    type: nexus-username-password
    username: admin
    password: your_nexus_password
    nexus_url: "https://nexus.example.com"

  - id: nexus-ci-token
    name: "Nexus CI Token"
    description: "CI 流水线使用的 Nexus API Token"
    type: nexus-token
    token: "NxToken_your_api_token_here"
    nexus_url: "https://nexus.example.com"