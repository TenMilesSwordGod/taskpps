# Git 凭据文件
# 引用语法: ${credential:<id>.<field>}

credentials:
  - id: github-token
    name: "GitHub Personal Access Token"
    description: "用于 clone/push 私有仓库的 GitHub Token"
    type: git-token
    token: ghp_your_personal_access_token_here
    provider: github

  - id: gitlab-ssh
    name: "GitLab SSH Key"
    description: "GitLab SSH 部署密钥"
    type: git-ssh-key
    username: git
    key_path: ~/.ssh/id_rsa_gitlab
    key_passphrase: ""
    provider: gitlab

  - id: gitee-userpass
    name: "Gitee 账号密码"
    description: "Gitee 仓库 HTTP 认证"
    type: git-username-password
    username: your_username
    password: your_password
    provider: gitee